<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KN Graph AI 问答</title>
    <link rel="stylesheet" href="/frontend/chat/style.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <a class="back-link" href="/frontend/" data-testid="back-to-search-btn">返回变量搜索</a>
        <button id="new-session-btn" class="primary-btn" data-testid="new-session-btn">新建会话</button>
        <button id="provider-settings-btn" class="ghost-btn" data-testid="provider-settings-btn">模型服务设置</button>
        <div class="section-title">会话列表</div>
        <div id="session-list" class="session-list" data-testid="session-list"></div>
      </aside>
      <main class="main">
        <header class="toolbar">
          <div class="mode-group">
            <label>模式</label>
            <select id="mode-select" data-testid="mode-select">
              <option value="fast">快速模式</option>
              <option value="agent">Agent 模式</option>
            </select>
          </div>
          <div class="mode-group">
            <label>Provider</label>
            <select id="provider-select" data-testid="provider-select">
              <option value="glm">GLM</option>
              <option value="deepseek">DeepSeek</option>
            </select>
          </div>
          <div class="mode-group mode-model">
            <label>Model</label>
            <select id="model-select" data-testid="model-select"></select>
            <input id="model-input" value="" data-testid="model-input" placeholder="自定义模型 ID" class="hidden" />
          </div>
        </header>
        <section id="chat-feed" class="chat-feed" data-testid="message-container"></section>
        <footer class="composer">
          <textarea
            id="prompt-input"
            rows="3"
            placeholder="输入问题，回车发送（Shift+Enter 换行）"
            data-testid="message-input"
          ></textarea>
          <button id="send-btn" class="primary-btn" data-testid="send-btn">发送</button>
        </footer>
      </main>
    </div>
    <div id="provider-modal" class="modal hidden" data-testid="provider-modal">
      <div class="modal-card">
        <header class="modal-header">
          <h3>模型服务配置</h3>
          <button id="provider-modal-close" class="ghost-btn">关闭</button>
        </header>
        <div class="modal-body">
          <div class="mode-group">
            <label>默认 Provider</label>
            <select id="default-provider-select" data-testid="default-provider-select"></select>
          </div>
          <div id="provider-rows" class="provider-rows" data-testid="provider-rows"></div>
          <div class="modal-actions">
            <button id="add-provider-btn" class="ghost-btn" data-testid="add-provider-btn">新增 Provider</button>
            <button id="save-provider-config-btn" class="primary-btn" data-testid="save-provider-config-btn">保存配置</button>
          </div>
          <div id="provider-save-status" class="meta"></div>
        </div>
      </div>
    </div>
    <script src="/frontend/chat/app.js"></script>
  </body>
</html>
