<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex 配置</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/frontend/chat/style.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-head">
          <div class="brand">Codex Config</div>
          <a class="back-link" href="/frontend/chat/">返回聊天</a>
        </div>
      </aside>
      <main class="main">
        <header class="toolbar">
          <div class="toolbar-group">
            <div class="field">
              <label>App Server 命令</label>
              <input id="codex-app-server-command" placeholder="codex" />
            </div>
            <div class="field">
              <label>模型</label>
              <input id="codex-model" placeholder="gpt-5.4" />
            </div>
            <div class="field">
              <label>超时（秒）</label>
              <input id="codex-timeout-seconds" type="number" min="15" step="1" />
            </div>
          </div>
        </header>
        <section class="chat-feed">
          <div class="field">
            <label>App Server 参数（JSON 数组）</label>
            <textarea id="codex-app-server-args" rows="3"></textarea>
          </div>
          <div class="field">
            <label>健康检查参数（JSON 数组）</label>
            <textarea id="codex-healthcheck-args" rows="2"></textarea>
          </div>
          <div class="field">
            <label>审批策略</label>
            <input id="codex-approval-policy" placeholder="never" />
          </div>
          <div class="field">
            <label>沙箱模式</label>
            <input id="codex-sandbox-mode" placeholder="workspace-write" />
          </div>
          <div class="field">
            <label>人格</label>
            <input id="codex-personality" placeholder="pragmatic" />
          </div>
          <div class="field">
            <label>MCP Servers（JSON 数组）</label>
            <textarea id="codex-mcp-servers" rows="6"></textarea>
          </div>
          <div class="field">
            <label>安装命令</label>
            <input id="codex-install-command" />
          </div>
          <div class="field">
            <label>额外环境变量（JSON 对象）</label>
            <textarea id="codex-extra-env" rows="4"></textarea>
          </div>
          <div class="modal-actions">
            <button id="codex-health-btn" class="ghost-btn" type="button">检测可用性</button>
            <button id="codex-install-btn" class="ghost-btn" type="button">安装 Codex</button>
            <button id="codex-save-btn" class="primary-btn" type="button">保存配置</button>
          </div>
          <div id="codex-status" class="meta"></div>
        </section>
      </main>
    </div>
    <script src="/frontend/chat/codex_config.js"></script>
  </body>
</html>
